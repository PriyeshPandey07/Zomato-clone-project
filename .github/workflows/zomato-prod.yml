name: Zomato Production CI/CD

on:
  push:
    branches:
    - main

jobs:
  build-and-deploy:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '18'

        - name: Install Dependencies
          run: npm install

        - name: OWASP Scan
          uses: dependency-check/Dependency-Check_Action@main
          with:
            project: "zomato"
            path: "."

        - name: Install Trivy
          run: |
            sudo apt-get update
            wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
            sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

        - name: Trivy FS Scan
          run: trivy fs . > trivyfs.txt

        - name: Login to DockerHub
          run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

        - name: Build Docker Image
          run: docker build -t ${{ secrets.DOCKER_USER }}/zomato-clone:v2 .

        - name: Push Docker Image
          run: docker push ${{ secrets.DOCKER_USER }}/zomato-clone:v2

        - name: Trivy Image Scan
          run: trivy image zomato-clone:v2 > trivy.txt

        - name: Deploy to EC2
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ubuntu
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              docker pull priyeshpandey07/zomato:v2
              docker stop zomato || true
              docker rm zomato || true
              docker run -d -p 3000:3000 --name zomato priyeshpandey07/zomato:v2

